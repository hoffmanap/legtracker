name: Monthly 50-State Housing Radar

on:
  schedule:
    # Runs at 00:00 UTC on the 1st day of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:
    # Allows you to manually trigger the sweep from the GitHub Actions tab

permissions:
  contents: write  # Crucial: Allows the bot to save the CSV back to your repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run 50-State Radar Sweep
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: python radar_sweep.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if the file exists and has changes
          git add legislation_master.csv
          
          # This line checks for changes; if none, it skips the commit to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated National Sweep: $(date +'%Y-%m-%d')" && git push)
